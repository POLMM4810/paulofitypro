<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Paulo Fit">
    <meta name="theme-color" content="#0a0a0a">
    <title>Paulo Fit</title>
    <style>
        :root {
            --bg: #0a0a0a;
            --card: #141414;
            --card2: #1e1e1e;
            --accent: #d4af37;
            --text: #ffffff;
            --text-dim: #aaaaaa;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: var(--bg);
            color: var(--text);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            padding: 20px;
            padding-bottom: 100px;
        }
        .header { text-align: center; margin-bottom: 25px; margin-top: 20px; }
        .header h1 { font-size: 32px; font-weight: 900; color: #e5ff00; text-transform: uppercase; letter-spacing: 1px; }
        .subtitle { font-size: 11px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 2px; margin-top: 5px; }
        
        .stats-badge-container { display: flex; justify-content: center; gap: 8px; margin-bottom: 20px; flex-wrap: wrap; }
        .badge { background: var(--card); padding: 6px 12px; border-radius: 20px; font-size: 13px; font-weight: 600; display: flex; align-items: center; gap: 6px; border: 1px solid #222; }
        .badge.fire { color: #ff6b6b; }
        .badge.calendar { color: #51cf66; }
        .badge.award { color: #fcc419; }

        .card { background: var(--card); border-radius: 16px; padding: 20px; margin-bottom: 15px; border: 1px solid #222; }
        .card-title { font-size: 14px; font-weight: 700; text-transform: uppercase; color: var(--text-dim); letter-spacing: 0.5px; margin-bottom: 15px; display: flex; align-items: center; gap: 8px; }
        
        .grid-4 { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 15px; }
        .grid-item { background: var(--card); border-radius: 12px; padding: 12px 5px; text-align: center; border: 1px solid #222; display: flex; flex-direction: column; justify-content: center; }
        .grid-value { font-size: 24px; font-weight: 800; color: #e5ff00; line-height: 1.2; }
        .grid-label { font-size: 9px; color: var(--text-dim); text-transform: uppercase; margin-top: 4px; font-weight: 600; }

        .progress-section { text-align: center; padding: 10px 0; }
        .progress-title { font-size: 20px; font-weight: 800; color: #e5ff00; text-transform: uppercase; }
        .progress-sub { font-size: 13px; color: var(--text-dim); margin-top: 5px; font-style: italic; }

        .input-group { margin-bottom: 12px; }
        .input-group label { display: block; font-size: 12px; color: var(--text-dim); margin-bottom: 5px; text-transform: uppercase; font-weight: 600; }
        .input-row { display: flex; gap: 10px; }
        input, select { flex: 1; background: var(--card2); border: 1px solid #333; padding: 12px; border-radius: 8px; color: #fff; font-size: 15px; }
        input:focus, select:focus { border-color: #e5ff00; outline: none; }
        
        button { background: #e5ff00; color: #000; border: none; padding: 12px 20px; border-radius: 8px; font-size: 15px; font-weight: 700; width: 100%; text-transform: uppercase; cursor: pointer; transition: background 0.2s; }
        button:active { background: #ccff00; transform: scale(0.98); }
        .btn-reset { background: #222; color: #ff6b6b; border: 1px solid #333; margin-top: 15px; padding: 8px; font-size: 12px; }

        .nav { position: fixed; bottom: 0; left: 0; right: 0; background: rgba(20,20,20,0.95); backdrop-filter: blur(10px); display: flex; border-top: 1px solid #222; padding-bottom: calc(env(safe-area-inset-bottom) + 5px); padding-top: 10px; z-index: 100; }
        .nav-btn { flex: 1; display: flex; flex-direction: column; align-items: center; background: none; border: none; color: var(--text-dim); padding: 5px; width: auto; }
        .nav-btn.active { color: #e5ff00; }
        .nav-btn span { font-size: 10px; font-weight: 600; text-transform: uppercase; margin-top: 4px; }
        .page { display: none; }
        .page.active { display: block; }
    </style>
</head>
<body>

    <div class="header">
        <h1>Paulo Fit</h1>
        <div class="subtitle">Plan 12 Semanas · Cadera · Fuerza · Bici</div>
    </div>

    <div class="stats-badge-container">
        <div class="badge fire">🔥 <span id="badge-dias">0</span> días</div>
        <div class="badge calendar">📅 <span id="badge-semana">Semana 1</span></div>
        <div class="badge award">🏅 <span id="badge-logros">0/12</span></div>
    </div>

    <div id="page-dashboard" class="page active">
        <div class="card">
            <div class="card-title">🎯 Objetivo de Peso</div>
            <input type="number" id="input-target-peso" placeholder="Configura tu peso objetivo (kg)" oninput="updateDashboard()">
        </div>

        <div class="grid-4">
            <div class="grid-item">
                <div class="grid-value" id="dash-peso">--</div>
                <div class="grid-label">Peso Kg</div>
            </div>
            <div class="grid-item">
                <div class="grid-value" id="dash-sesiones">0</div>
                <div class="grid-label">Sesiones</div>
            </div>
            <div class="grid-item">
                <div class="grid-value" id="dash-kcal">0</div>
                <div class="grid-label">Kcal</div>
            </div>
            <div class="grid-item">
                <div class="grid-value" id="dash-km">0</div>
                <div class="grid-label">Km Bici</div>
            </div>
        </div>

        <div class="card progress-section">
            <div class="card-title" style="justify-content: center;">📈 Progreso Real</div>
            <div class="progress-title">Consistencia</div>
            <div class="progress-sub">No busques la perfección. Busca la consistencia semana a semana.</div>
        </div>
    </div>

    <div id="page-log" class="page">
        <div class="card">
            <div class="card-title">📝 Registrar Datos</div>
            
            <div class="input-group">
                <label>Progreso de Tiempo</label>
                <div class="input-row">
                    <input type="number" id="input-dias" placeholder="Días seguidos">
                    <select id="input-semana">
                        <option value="1">Semana 1</option>
                        <option value="2">Semana 2</option>
                        <option value="3">Semana 3</option>
                        <option value="4">Semana 4</option>
                        <option value="5">Semana 5</option>
                        <option value="6">Semana 6</option>
                        <option value="7">Semana 7</option>
                        <option value="8">Semana 8</option>
                        <option value="9">Semana 9</option>
                        <option value="10">Semana 10</option>
                        <option value="11">Semana 11</option>
                        <option value="12">Semana 12</option>
                    </select>
                </div>
            </div>

            <div class="input-group">
                <label>Métricas Corporales y Actividad</label>
                <div class="input-row" style="margin-bottom:10px;">
                    <input type="number" step="0.1" id="input-peso" placeholder="Peso actual (kg)">
                    <input type="number" id="input-sesiones" placeholder="Sesiones hoy">
                </div>
                <div class="input-row">
                    <input type="number" id="input-kcal" placeholder="Kcal quemadas">
                    <input type="number" step="0.1" id="input-km" placeholder="Km bicicleta">
                </div>
            </div>

            <button onclick="guardarDatos()">Guardar Entrenamiento</button>
            <button class="btn-reset" onclick="clearLocalStorage()">Borrar todos los datos</button>
        </div>
    </div>

    <div class="nav">
        <button class="nav-btn active" onclick="switchPage('dashboard', this)">
            📊 <span>Panel</span>
        </button>
        <button class="nav-btn" onclick="switchPage('log', this)">
            ✍️ <span>Registrar</span>
        </button>
    </div>

    <script>
        // Objeto global de datos
        let appData = {
            dias: 0,
            semana: "1",
            logros: 0,
            targetPeso: "",
            peso: "--",
            sesiones: 0,
            kcal: 0,
            km: 0
        };

        // Al cargar la página, lee el almacén del móvil
        window.onload = function() {
            if (localStorage.getItem('pauloFitData')) {
                appData = JSON.parse(localStorage.getItem('pauloFitData'));
                
                // Rellenar inputs con lo guardado anteriormente
                document.getElementById('input-target-peso').value = appData.targetPeso || "";
                document.getElementById('input-dias').value = appData.dias || 0;
                document.getElementById('input-semana').value = appData.semana || "1";
                document.getElementById('input-peso').value = appData.peso !== "--" ? appData.peso : "";
                document.getElementById('input-sesiones').value = appData.sesiones || 0;
                document.getElementById('input-kcal').value = appData.kcal || 0;
                document.getElementById('input-km').value = appData.km || 0;
            }
            updateDashboard();
        };

        function switchPage(pageId, btn) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('page-' + pageId).classList.add('active');
            btn.classList.add('active');
        }

        function updateDashboard() {
            // Guardar dinámicamente el objetivo de peso al escribirlo
            appData.targetPeso = document.getElementById('input-target-peso').value;

            // Calcular logros basados en la semana actual
            appData.logros = parseInt(appData.semana) - 1;
            if (appData.logros < 0) appData.logros = 0;

            // Actualizar textos de la interfaz
            document.getElementById('badge-dias').innerText = appData.dias;
            document.getElementById('badge-semana').innerText = "Semana " + appData.semana;
            document.getElementById('badge-logros').innerText = appData.logros + "/12";

            document.getElementById('dash-peso').innerText = appData.peso || "--";
            document.getElementById('dash-sesiones').innerText = appData.sesiones;
            document.getElementById('dash-kcal').innerText = appData.kcal;
            document.getElementById('dash-km').innerText = appData.km;

            // Guardar en el teléfono cada vez que se actualiza el panel
            localStorage.setItem('pauloFitData', JSON.stringify(appData));
        }

        function guardarDatos() {
            appData.dias = document.getElementById('input-dias').value || 0;
            appData.semana = document.getElementById('input-semana').value || "1";
            appData.peso = document.getElementById('input-peso').value || "--";
            appData.sesiones = document.getElementById('input-sesiones').value || 0;
            appData.kcal = document.getElementById('input-kcal').value || 0;
            appData.km = document.getElementById('input-km').value || 0;

            updateDashboard();
            alert("¡Datos guardados con éxito en tu dispositivo!");
            switchPage('dashboard', document.querySelectorAll('.nav-btn')[0]);
        }

        function clearLocalStorage() {
            if (confirm("¿Seguro que quieres borrar todos los datos guardados en la app?")) {
                localStorage.removeItem('pauloFitData');
                appData = { dias: 0, semana: "1", logros: 0, targetPeso: "", peso: "--", sesiones: 0, kcal: 0, km: 0 };
                
                // Limpiar inputs
                document.getElementById('input-target-peso').value = "";
                document.getElementById('input-dias').value = "";
                document.getElementById('input-semana').value = "1";
                document.getElementById('input-peso').value = "";
                document.getElementById('input-sesiones').value = "";
                document.getElementById('input-kcal').value = "";
                document.getElementById('input-km').value = "";
                
                updateDashboard();
            }
        }
    </script>
</body>
</html>
